<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily Ring">
<meta name="theme-color" content="#0c0d12">
<title>Daily Ring</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700;900&family=DM+Mono:wght@300;400;500&display=swap');

:root {
–bg: #0c0d12;
–surf: #13141b;
–card: #1a1c26;
–brd: #252833;
–brd2: #32364a;
–txt: #e2e4ef;
–mut: #52566e;
–acc: #4d8ef0;
–acc2: #f07a4d;
–grn: #4df09a;
–red: #f04d6a;
–ylw: #f0d24d;
–pur: #9a4df0;
–meal-m: #f0c04d;
–meal-n: #7a4df0;
–r: 13px;
–r2: 10px;
–nav-h: 60px;
}

- { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; height: -webkit-fill-available; }
  body {
  font-family: ‘Noto Sans JP’, sans-serif;
  background: var(–bg);
  color: var(–txt);
  max-width: 480px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  height: 100%;
  height: -webkit-fill-available;
  overflow: hidden;
  }

/* SCROLL BODY */
.app-body {
flex: 1;
overflow-y: auto;
overflow-x: hidden;
padding: 0 14px calc(var(–nav-h) + env(safe-area-inset-bottom) + 10px);
-webkit-overflow-scrolling: touch;
}
.app-body::-webkit-scrollbar { display: none; }

/* BOTTOM NAV */
.bnav {
position: fixed;
bottom: 0; left: 50%;
transform: translateX(-50%);
width: 100%; max-width: 480px;
background: var(–surf);
border-top: 1px solid var(–brd);
display: flex;
z-index: 60;
padding-bottom: env(safe-area-inset-bottom);
}
.nb {
flex: 1; padding: 9px 0 11px;
background: none; border: none;
color: var(–mut);
font-size: 9px;
cursor: pointer;
display: flex; flex-direction: column;
align-items: center; gap: 3px;
transition: color .15s;
font-family: ‘Noto Sans JP’, sans-serif;
}
.nb .ni { font-size: 20px; line-height: 1; }
.nb.on { color: var(–acc); }

/* PAGES */
.pg { display: none; }
.pg.on { display: block; }

/* PAGE HEADER */
.ph {
display: flex; align-items: center;
justify-content: space-between;
padding: 18px 0 12px;
}
.pt { font-size: 20px; font-weight: 900; letter-spacing: -.5px; }
.psub { font-size: 11px; color: var(–mut); font-family: ‘DM Mono’, monospace; }

/* SECTION HEADER */
.sh {
display: flex; align-items: center;
gap: 8px; font-size: 10px;
color: var(–mut); text-transform: uppercase;
letter-spacing: 1.5px; margin: 14px 0 8px;
}
.sh::after { content: ‘’; flex: 1; height: 1px; background: var(–brd); }

/* BUTTON */
.btn {
display: inline-flex; align-items: center;
justify-content: center; gap: 5px;
padding: 10px 14px; border-radius: var(–r2);
border: 1px solid var(–brd);
background: var(–card); color: var(–txt);
font-family: ‘Noto Sans JP’, sans-serif;
font-size: 12px; cursor: pointer;
transition: all .15s; white-space: nowrap;
-webkit-appearance: none;
}
.btn:active { opacity: .75; }
.btn.pri { background: var(–acc); color: #fff; border-color: var(–acc); font-weight: 700; }
.btn.sm { padding: 6px 12px; font-size: 11px; }
.btn.danger { border-color: var(–red); color: var(–red); background: none; }

/* INPUTS */
label {
display: block; font-size: 10px;
color: var(–mut); letter-spacing: 1.5px;
margin-bottom: 5px; text-transform: uppercase;
}
input[type=text],
input[type=time],
input[type=date],
input[type=number],
select, textarea {
width: 100%; padding: 11px 13px;
background: var(–bg);
border: 1px solid var(–brd);
border-radius: var(–r2);
color: var(–txt);
font-family: ‘DM Mono’, monospace;
font-size: 14px; outline: none;
transition: border-color .15s;
-webkit-appearance: none;
}
input:focus, select:focus, textarea:focus { border-color: var(–acc); }
select option { background: var(–bg); }
textarea { resize: none; height: 70px; font-size: 12px; }
.fg { margin-bottom: 13px; }
.tr { display: flex; gap: 8px; }

/* TOGGLE */
.togrow {
display: flex; align-items: center;
justify-content: space-between;
padding: 11px 13px;
background: var(–bg);
border: 1px solid var(–brd);
border-radius: var(–r2);
}
.togl { font-size: 12px; }
.togs {
width: 44px; height: 24px;
background: var(–brd2); border-radius: 12px;
position: relative; cursor: pointer;
transition: background .2s; flex-shrink: 0;
}
.togs.on { background: var(–acc); }
.togk {
width: 18px; height: 18px; background: #fff;
border-radius: 50%; position: absolute;
top: 3px; left: 3px;
transition: left .2s;
box-shadow: 0 1px 4px rgba(0,0,0,.4);
}
.togs.on .togk { left: 23px; }

/* COLOR PICKER */
.cp { display: flex; gap: 8px; flex-wrap: wrap; }
.csw {
width: 30px; height: 30px; border-radius: 50%;
border: 2px solid transparent; cursor: pointer;
transition: transform .12s, border-color .12s;
}
.csw.sel { border-color: #fff; transform: scale(1.18); }

/* CAT TAGS */
.ctags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.ctag {
padding: 5px 11px; border-radius: 20px;
font-size: 11px; background: var(–bg);
border: 1px solid var(–brd); cursor: pointer;
transition: all .15s;
}
.ctag:active { border-color: var(–acc); color: var(–acc); }

/* MODAL */
.ov {
display: none; position: fixed; inset: 0;
background: rgba(0,0,0,.8); z-index: 200;
align-items: flex-end; justify-content: center;
backdrop-filter: blur(8px);
-webkit-backdrop-filter: blur(8px);
}
.ov.on { display: flex; }
.modal {
width: 100%; max-width: 480px;
background: var(–surf);
border: 1px solid var(–brd);
border-radius: 20px 20px 0 0;
padding: 20px 16px calc(28px + env(safe-area-inset-bottom));
animation: su .25s cubic-bezier(.22,.68,0,1.15);
max-height: 90vh; overflow-y: auto;
}
.modal::-webkit-scrollbar { display: none; }
@keyframes su {
from { transform: translateY(100%); opacity: 0; }
to { transform: translateY(0); opacity: 1; }
}
.mth {
display: flex; justify-content: space-between;
align-items: center; margin-bottom: 16px;
}
.mtit { font-size: 15px; font-weight: 900; }
.mcl {
background: none; border: none;
color: var(–mut); font-size: 22px; cursor: pointer;
padding: 0 4px;
}

/* EMPTY */
.empty {
text-align: center; padding: 32px 16px;
color: var(–mut); font-size: 12px; line-height: 2;
}
.empty .ei { font-size: 36px; }

/* =====================
SCHEDULE PAGE
===================== */
.date-bar {
display: flex; align-items: center; gap: 8px;
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 10px 14px;
margin-bottom: 14px;
}
.date-bar .dc { flex: 1; text-align: center; }
.date-bar .db { font-size: 14px; font-weight: 700; }
.date-bar .ds { font-size: 10px; color: var(–mut); font-family: ‘DM Mono’, monospace; margin-top: 1px; }
.dnb {
background: none; border: none;
color: var(–acc); font-size: 22px; cursor: pointer;
padding: 0 6px; line-height: 1;
}

.chart-wrap {
position: relative;
width: 270px; height: 270px;
margin: 0 auto 16px;
}
#msvg { width: 100%; height: 100%; }
.cinfo {
position: absolute; inset: 0;
display: flex; flex-direction: column;
align-items: center; justify-content: center;
pointer-events: none;
}
.ctime {
font-family: ‘DM Mono’, monospace;
font-size: 26px; font-weight: 300; letter-spacing: 2px;
}
.cdat { font-size: 11px; color: var(–mut); margin-top: 3px; }

.fab-row { display: flex; gap: 8px; margin-bottom: 4px; }
.fab-row .btn { flex: 1; font-size: 11px; padding: 10px 6px; }

.legitem {
display: flex; align-items: center; gap: 9px;
padding: 11px 12px;
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r2); margin-bottom: 6px;
}
.ldot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
.lname { font-size: 13px; font-weight: 700; flex: 1; }
.ltime { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–mut); }
.lbadge {
font-size: 9px; padding: 2px 6px;
border-radius: 10px; background: var(–acc);
color: #000; font-weight: 700;
}
.lbadge.study { background: var(–pur); color: #fff; }
.ldel {
background: none; border: none;
color: var(–mut); cursor: pointer;
font-size: 15px; padding: 0 0 0 4px;
}
.ldel:active { color: var(–red); }

/* =====================
CALENDAR PAGE
===================== */
.cal-nav {
display: flex; align-items: center;
justify-content: space-between; margin-bottom: 10px;
}
.cal-month { font-size: 17px; font-weight: 900; }
.cnb {
background: none; border: none;
color: var(–acc); font-size: 22px;
cursor: pointer; padding: 6px;
}
.cgrid {
display: grid; grid-template-columns: repeat(7,1fr);
gap: 2px; margin-bottom: 10px;
}
.cdow {
text-align: center; font-size: 9px;
color: var(–mut); padding: 3px 0;
font-family: ‘DM Mono’, monospace;
}
.cdow:first-child { color: var(–red); }
.cdow:last-child { color: var(–acc); }

.ccell {
min-height: 56px;
background: var(–card);
border: 1px solid var(–brd);
border-radius: 8px; padding: 3px;
cursor: pointer;
display: flex; flex-direction: column;
transition: border-color .12s;
}
.ccell.om { opacity: .25; pointer-events: none; }
.ccell.today {
border-color: var(–acc);
background: rgba(77,142,240,.12);
}
.ccell.sel {
border-color: var(–acc);
background: rgba(77,142,240,.1);
box-shadow: 0 0 0 1px var(–acc);
}
.ccell.hol .cnum { color: var(–red); }
.ccell.sat .cnum { color: var(–acc); }

.cnum { font-size: 10px; font-weight: 700; line-height: 1; margin-bottom: 2px; }
.today-badge {
display: inline-flex; align-items: center;
justify-content: center;
width: 18px; height: 18px; border-radius: 50%;
background: var(–acc); color: #000;
font-size: 10px; font-weight: 900;
}
.cevs { display: flex; flex-direction: column; gap: 1px; flex: 1; }
.cebar {
font-size: 7.5px; border-radius: 2px;
padding: 1px 3px; line-height: 1.3;
white-space: nowrap; overflow: hidden;
text-overflow: ellipsis;
color: #000; font-weight: 700;
}
.mdots { display: flex; gap: 2px; margin-top: 2px; flex-wrap: wrap; align-items: center; }
.mdot { width: 6px; height: 6px; border-radius: 50%; }
.mdot.mm { background: var(–meal-m); }
.mdot.mn { background: var(–meal-n); }
.tdot { width: 5px; height: 5px; border-radius: 50%; border: 1.5px solid var(–ylw); }
.tdot.done { background: var(–grn); border-color: var(–grn); }

/* Day detail panel */
.ddpanel {
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 13px;
margin-bottom: 10px; display: none;
}
.ddpanel.on { display: block; }
.ddtit {
font-size: 13px; font-weight: 700; color: var(–acc);
margin-bottom: 10px;
display: flex; align-items: center; justify-content: space-between;
}
.goto-btn {
font-size: 10px; padding: 5px 10px;
border-radius: 20px; border: 1px solid var(–acc);
background: none; color: var(–acc);
cursor: pointer; font-family: ‘Noto Sans JP’, sans-serif;
transition: all .15s;
}
.goto-btn:active { background: var(–acc); color: #000; }

/* Meal rows */
.mrow {
display: flex; align-items: center; gap: 10px;
padding: 9px 0; border-top: 1px solid var(–brd);
}
.micon { font-size: 20px; }
.minfo { flex: 1; }
.mlabel { font-size: 13px; font-weight: 700; }
.mprice { font-size: 10px; color: var(–mut); font-family: ‘DM Mono’, monospace; }
.mbtn {
padding: 7px 16px; border-radius: 20px;
border: 1px solid var(–brd);
background: none; color: var(–mut);
font-size: 12px; cursor: pointer;
transition: all .2s;
font-family: ‘Noto Sans JP’, sans-serif;
}

/* Meal summary card */
.meal-sum {
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 14px; margin-bottom: 10px;
}
.meal-sum-hd {
font-size: 10px; color: var(–mut);
text-transform: uppercase; letter-spacing: 1px;
margin-bottom: 10px;
display: flex; justify-content: space-between; align-items: center;
}
.meal-total {
font-family: ‘DM Mono’, monospace;
font-size: 22px; font-weight: 400; color: var(–acc2);
}

/* =====================
STUDY PAGE
===================== */
.study-hd {
background: linear-gradient(135deg, rgba(154,77,240,.14), rgba(77,142,240,.07));
border: 1px solid rgba(154,77,240,.28);
border-radius: var(–r); padding: 16px; margin-bottom: 12px;
}
.study-total {
font-family: ‘DM Mono’, monospace;
font-size: 30px; font-weight: 300; color: var(–pur);
}
.scard {
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 14px; margin-bottom: 8px;
}
.scard-head {
display: flex; align-items: center;
justify-content: space-between; margin-bottom: 10px;
}
.scard-name { font-size: 13px; font-weight: 700; }
.scard-time {
font-family: ‘DM Mono’, monospace;
font-size: 20px; color: var(–acc); font-weight: 300;
}
.pbar { height: 5px; background: var(–brd); border-radius: 3px; overflow: hidden; margin: 8px 0; }
.pfill { height: 100%; border-radius: 3px; transition: width .5s ease; }
.goal-info { font-size: 10px; color: var(–mut); display: flex; justify-content: space-between; }
.pace-ok {
background: rgba(77,240,154,.06); border: 1px solid rgba(77,240,154,.2);
border-radius: var(–r2); padding: 9px 12px;
font-size: 11px; color: var(–grn); margin-top: 7px; line-height: 1.7;
}
.pace-ng {
background: rgba(240,77,106,.06); border: 1px solid rgba(240,77,106,.2);
border-radius: var(–r2); padding: 9px 12px;
font-size: 11px; color: var(–red); margin-top: 7px; line-height: 1.7;
}
.month-bar-wrap {
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 14px;
}

/* =====================
TODO PAGE
===================== */
.todo-item {
display: flex; align-items: flex-start; gap: 10px;
padding: 12px; background: var(–card);
border: 1px solid var(–brd);
border-radius: var(–r); margin-bottom: 7px;
transition: all .2s;
}
.tchk {
width: 22px; height: 22px; border-radius: 50%;
border: 2px solid var(–brd2); background: none;
cursor: pointer; flex-shrink: 0;
display: flex; align-items: center; justify-content: center;
font-size: 12px; transition: all .2s; margin-top: 1px;
}
.tchk.done { background: var(–grn); border-color: var(–grn); color: #000; }
.tbody { flex: 1; min-width: 0; }
.ttitle { font-size: 13px; font-weight: 700; margin-bottom: 3px; transition: all .2s; }
.todo-item.done .ttitle { text-decoration: line-through; text-decoration-thickness: 2px; color: var(–mut); font-weight: 400; }
.tmeta { display: flex; gap: 7px; align-items: center; flex-wrap: wrap; }
.tdl { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–mut); }
.tdl.near { color: var(–ylw); }
.tdl.over { color: var(–red); }
.tcalbadge { font-size: 8px; padding: 2px 5px; border-radius: 10px; background: var(–acc); color: #000; font-weight: 700; }
.tact-btn { background: none; border: none; color: var(–mut); cursor: pointer; font-size: 15px; }
.tact-btn:active { color: var(–red); }
.filter-row { display: flex; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
.fchip { padding: 5px 12px; border-radius: 20px; font-size: 11px; background: var(–bg); border: 1px solid var(–brd); cursor: pointer; transition: all .15s; }
.fchip.on { background: var(–acc); border-color: var(–acc); color: #000; font-weight: 700; }

/* =====================
TEMPLATE PAGE
===================== */
.titem {
background: var(–card); border: 1px solid var(–brd);
border-radius: var(–r); padding: 13px;
margin-bottom: 7px;
display: flex; align-items: center; gap: 10px;
}
.tclr { width: 4px; align-self: stretch; border-radius: 4px; flex-shrink: 0; }
.tinfo { flex: 1; }
.tname { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
.ttime { font-family: ‘DM Mono’, monospace; font-size: 10px; color: var(–mut); }
.tact { display: flex; gap: 6px; }

/* STUDY SUBJ ITEM */
.ssi {
display: flex; align-items: center; gap: 10px;
padding: 10px 12px; background: var(–bg);
border: 1px solid var(–brd); border-radius: var(–r2);
cursor: pointer; transition: border-color .15s;
}
.ssi.sel { border-color: var(–pur); background: rgba(154,77,240,.07); }
.ssi-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
</style>

</head>
<body>

<div class="app-body" id="appBody">

<!-- ====== SCHEDULE ====== -->

<div class="pg on" id="pg-sch">
  <div class="ph">
    <div><div class="pt">Daily Ring</div><div class="psub" id="schSub"></div></div>
    <button class="btn sm" onclick="goToday()">今日へ</button>
  </div>
  <div class="date-bar">
    <button class="dnb" onclick="shiftDay(-1)">‹</button>
    <div class="dc">
      <div class="db" id="dateBig"></div>
      <div class="ds" id="dateSmall"></div>
    </div>
    <button class="dnb" onclick="shiftDay(1)">›</button>
  </div>
  <div class="chart-wrap">
    <svg id="msvg" viewBox="0 0 270 270" xmlns="http://www.w3.org/2000/svg"></svg>
    <div class="cinfo">
      <div class="ctime" id="clk">--:--</div>
      <div class="cdat" id="cdateTxt"></div>
    </div>
  </div>
  <div class="fab-row">
    <button class="btn" onclick="openTPicker()">📋 テンプレ</button>
    <button class="btn pri" onclick="openAddSch()">＋ 予定を追加</button>
  </div>
  <div class="sh">本日の予定</div>
  <div id="legEl"></div>
</div>

<!-- ====== CALENDAR ====== -->

<div class="pg" id="pg-cal">
  <div class="ph"><div class="pt">カレンダー</div></div>
  <div class="cal-nav">
    <button class="cnb" onclick="shiftCalM(-1)">‹</button>
    <div class="cal-month" id="calTitle"></div>
    <button class="cnb" onclick="shiftCalM(1)">›</button>
  </div>
  <div class="cgrid" id="cgrid"></div>
  <div class="ddpanel" id="ddpanel">
    <div class="ddtit">
      <span id="ddTitle"></span>
      <button class="goto-btn" onclick="gotoSch()">📅 この日の予定 →</button>
    </div>
    <div id="ddSch"></div>
    <div class="sh" style="margin-top:10px;">🍚 寮のごはん</div>
    <div id="ddMeal"></div>
    <div class="sh" style="margin-top:8px;">✅ TODO</div>
    <div id="ddTodo"></div>
  </div>
  <div class="sh">今月の食費</div>
  <div class="meal-sum">
    <div class="meal-sum-hd">
      <span>月合計</span>
      <span class="meal-total" id="mTotal">¥0</span>
    </div>
    <div style="font-size:11px;color:var(--mut);font-family:'DM Mono',monospace;" id="mBreak"></div>
  </div>
</div>

<!-- ====== STUDY ====== -->

<div class="pg" id="pg-study">
  <div class="ph">
    <div><div class="pt">勉強管理</div><div class="psub">Study Tracker</div></div>
    <button class="btn sm" onclick="openStudySettings()">⚙ 科目設定</button>
  </div>
  <div class="study-hd">
    <div style="font-size:10px;color:var(--mut);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;">今月の総勉強時間</div>
    <div class="study-total" id="studyMonthTotal">0h 00m</div>
    <div style="font-size:11px;color:var(--mut);margin-top:3px;" id="studyMonthSub"></div>
  </div>
  <div class="sh">科目別レポート</div>
  <div id="studyCards"></div>
  <div class="sh">月別推移（過去6ヶ月）</div>
  <div class="month-bar-wrap" id="monthBarWrap"></div>
</div>

<!-- ====== TODO ====== -->

<div class="pg" id="pg-todo">
  <div class="ph">
    <div><div class="pt">TODO</div><div class="psub" id="todoCnt"></div></div>
    <button class="btn sm pri" onclick="openAddTodo()">＋ 追加</button>
  </div>
  <div class="filter-row">
    <div class="fchip on" data-f="all" onclick="setFilter('all')">すべて</div>
    <div class="fchip" data-f="active" onclick="setFilter('active')">未完了</div>
    <div class="fchip" data-f="done" onclick="setFilter('done')">完了済み</div>
    <div class="fchip" data-f="near" onclick="setFilter('near')">期限近い</div>
  </div>
  <div id="todoList"></div>
</div>

<!-- ====== TEMPLATES ====== -->

<div class="pg" id="pg-tmpl">
  <div class="ph"><div class="pt">テンプレート</div></div>
  <div class="sh" style="justify-content:space-between;">
    <span>予定テンプレート</span>

<script>
// =========================================
//  CONSTANTS & STATE
// =========================================
const PAL = ['#4d8ef0','#f07a4d','#4df09a','#f0d24d','#9a4df0','#f04d6a','#4df0e0','#f0b84d','#a0f04d','#f04dc8'];
const DJ = ['\u65e5','\u6708','\u706b','\u6c34','\u6728','\u91d1','\u571f'];
const HOL = {
  '2026-01-01':'\u5143\u65e5','2026-01-12':'\u6210\u4eba\u306e\u65e5',
  '2026-02-11':'\u5efa\u56fd\u8a18\u5ff5\u65e5','2026-02-23':'\u5929\u7687\u8a95\u751f\u65e5',
  '2026-03-20':'\u6625\u5206\u306e\u65e5','2026-04-29':'\u662d\u548c\u306e\u65e5',
  '2026-05-03':'\u61b2\u6cd5\u8a18\u5ff5\u65e5','2026-05-04':'\u307f\u3069\u308a\u306e\u65e5',
  '2026-05-05':'\u3053\u3069\u3082\u306e\u65e5','2026-07-20':'\u6d77\u306e\u65e5',
  '2026-08-11':'\u5c71\u306e\u65e5','2026-09-21':'\u656c\u8001\u306e\u65e5',
  '2026-09-23':'\u79cb\u5206\u306e\u65e5','2026-10-12':'\u30b9\u30dd\u30fc\u30c4\u306e\u65e5',
  '2026-11-03':'\u6587\u5316\u306e\u65e5','2026-11-23':'\u52e4\u52b4\u611f\u8b1d\u306e\u65e5'
};

let selDate = new Date(); selDate.setHours(0,0,0,0);
let calY = selDate.getFullYear(), calM = selDate.getMonth();
let selCalDate = null;
let schSC = PAL[0], tmplSC = PAL[0], studySC = PAL[5];
let editTIdx = null, editTKind = null, editTodoIdx = null;
let todoFilter = 'all';

function LS(k,d){ try{ return JSON.parse(localStorage.getItem(k)) || d; }catch(e){ return d; } }
function SS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }

let schData    = LS('dr_sch', {});
let mealData   = LS('dr_meal', {});
let schTmpls   = LS('dr_stmpl', []);
let studyTmpls = LS('dr_study', []);
let todos      = LS('dr_todos', []);

function save(){
  SS('dr_sch', schData);
  SS('dr_meal', mealData);
  SS('dr_stmpl', schTmpls);
  SS('dr_study', studyTmpls);
  SS('dr_todos', todos);
}

function dk(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function tmins(t){ var p=t.split(':').map(Number); return p[0]*60+p[1]; }
function mhm(m){ return Math.floor(m/60)+'h '+String(m%60).padStart(2,'0')+'m'; }
function mRange(s,e){ var sm=tmins(s),em=tmins(e); if(em<=sm)em+=1440; return em-sm; }

// =========================================
//  NAV
// =========================================
function sp(p){
  document.querySelectorAll('.pg').forEach(function(e){ e.classList.remove('on'); });
  document.querySelectorAll('.nb').forEach(function(e){ e.classList.remove('on'); });
  document.getElementById('pg-'+p).classList.add('on');
  document.getElementById('nb-'+p).classList.add('on');
  document.getElementById('appBody').scrollTop = 0;
  if(p==='cal') renderCal();
  if(p==='study') renderStudy();
  if(p==='todo') renderTodo();
  if(p==='tmpl') renderTmpls();
  if(p==='sch') renderSchPage();
}

// =========================================
//  CLOCK
// =========================================
function updClk(){
  var n=new Date();
  document.getElementById('clk').textContent = String(n.getHours()).padStart(2,'0')+':'+String(n.getMinutes()).padStart(2,'0');
}
setInterval(updClk,1000); updClk();

// =========================================
//  SCHEDULE PAGE
// =========================================
function goToday(){ selDate=new Date(); selDate.setHours(0,0,0,0); renderSchPage(); }
function shiftDay(d){ selDate.setDate(selDate.getDate()+d); renderSchPage(); }

function renderSchPage(){
  var d=selDate, k=dk(d);
  var today=new Date(); today.setHours(0,0,0,0);
  var diff=(d.getTime()-today.getTime())/86400000;
  document.getElementById('dateBig').textContent = d.getFullYear()+'\u5e74'+( d.getMonth()+1)+'\u6708'+d.getDate()+'\u65e5\uff08'+DJ[d.getDay()]+'\uff09';
  document.getElementById('dateSmall').textContent = diff===0?'\u4eca\u65e5':diff===-1?'\u6628\u65e5':diff===1?'\u660e\u65e5':'';
  document.getElementById('schSub').textContent = k;
  document.getElementById('cdateTxt').textContent = (d.getMonth()+1)+'/'+d.getDate()+' '+DJ[d.getDay()];
  drawChart(); drawLegend();
}

// CHART
var CX=135,CY=135,OR=126,IR=62;
function ta(t){ var p=t.split(':').map(Number); return ((p[0]+p[1]/60)/24)*360-90; }
function pol(a,r){ var rad=a*Math.PI/180; return {x:CX+r*Math.cos(rad),y:CY+r*Math.sin(rad)}; }

function drawChart(){
  var svg=document.getElementById('msvg');
  var ns='http://www.w3.org/2000/svg';
  svg.innerHTML='';

  // bg
  var bg=document.createElementNS(ns,'circle');
  bg.setAttribute('cx',CX);bg.setAttribute('cy',CY);bg.setAttribute('r',OR);
  bg.setAttribute('fill','#14151e'); svg.appendChild(bg);

  // ticks
  for(var h=0;h<24;h++){
    var ang=(h/24)*360-90, mj=h%3===0;
    var r1=mj?OR-12:OR-7;
    var p1=pol(ang,OR),p2=pol(ang,r1);
    var ln=document.createElementNS(ns,'line');
    ln.setAttribute('x1',p1.x);ln.setAttribute('y1',p1.y);
    ln.setAttribute('x2',p2.x);ln.setAttribute('y2',p2.y);
    ln.setAttribute('stroke',mj?'#2e3140':'#1e2030');
    ln.setAttribute('stroke-width',mj?'1.5':'1');
    svg.appendChild(ln);
    if(mj){
      var tp=pol(ang,OR-20);
      var tx=document.createElementNS(ns,'text');
      tx.setAttribute('x',tp.x);tx.setAttribute('y',tp.y);
      tx.setAttribute('text-anchor','middle');tx.setAttribute('dominant-baseline','middle');
      tx.setAttribute('font-size','6.5');tx.setAttribute('fill','#2e3140');
      tx.setAttribute('font-family','DM Mono, monospace');tx.textContent=h;
      svg.appendChild(tx);
    }
  }

  // base ring
  var rng=document.createElementNS(ns,'circle');
  rng.setAttribute('cx',CX);rng.setAttribute('cy',CY);
  rng.setAttribute('r',(OR+IR)/2);
  rng.setAttribute('fill','none');rng.setAttribute('stroke','#1a1c26');
  rng.setAttribute('stroke-width',OR-IR); svg.appendChild(rng);

  // schedule arcs
  var k=dk(selDate), list=schData[k]||[];
  for(var i=0;i<list.length;i++){
    var s=list[i];
    var sa=ta(s.start),ea=ta(s.end);
    if(ea<=sa) ea+=360;
    var sw=ea-sa, la=sw>180?1:0;
    var p1=pol(sa,OR-2),p2=pol(ea,OR-2),p3=pol(ea,IR+2),p4=pol(sa,IR+2);
    var dd='M'+p1.x+' '+p1.y+' A'+(OR-2)+' '+(OR-2)+' 0 '+la+' 1 '+p2.x+' '+p2.y+' L'+p3.x+' '+p3.y+' A'+(IR+2)+' '+(IR+2)+' 0 '+la+' 0 '+p4.x+' '+p4.y+'Z';
    var g=document.createElementNS(ns,'g');
    var path=document.createElementNS(ns,'path');
    path.setAttribute('d',dd);path.setAttribute('fill',s.color);path.setAttribute('opacity','0.82');
    g.appendChild(path);
    if(sw>14){
      var mid=pol(sa+sw/2,(OR+IR)/2);
      var txt=document.createElementNS(ns,'text');
      txt.setAttribute('x',mid.x);txt.setAttribute('y',mid.y);
      txt.setAttribute('text-anchor','middle');txt.setAttribute('dominant-baseline','middle');
      txt.setAttribute('font-size',sw>28?'8':'6');
      txt.setAttribute('fill','rgba(0,0,0,0.8)');
      txt.setAttribute('font-family','Noto Sans JP, sans-serif');
      txt.setAttribute('font-weight','700');txt.setAttribute('pointer-events','none');
      var lbl=(s.name==='\u52c9\u5f37'&&s.studySubj)?s.studySubj:s.name;
      txt.textContent=lbl.length>4?lbl.slice(0,4):lbl;
      g.appendChild(txt);
    }
    svg.appendChild(g);
  }

  // now needle
  var now=new Date();
  if(dk(selDate)===dk(now)){
    var na=ta(String(now.getHours()).padStart(2,'0')+':'+String(now.getMinutes()).padStart(2,'0'));
    var np1=pol(na,OR+4),np2=pol(na,IR-7);
    var nl=document.createElementNS(ns,'line');
    nl.setAttribute('x1',np1.x);nl.setAttribute('y1',np1.y);
    nl.setAttribute('x2',np2.x);nl.setAttribute('y2',np2.y);
    nl.setAttribute('stroke','#4d8ef0');nl.setAttribute('stroke-width','2');
    nl.setAttribute('stroke-linecap','round'); svg.appendChild(nl);
    var nd=document.createElementNS(ns,'circle');
    nd.setAttribute('cx',np1.x);nd.setAttribute('cy',np1.y);
    nd.setAttribute('r','3');nd.setAttribute('fill','#4d8ef0');
    svg.appendChild(nd);
  }

  // inner circle
  var ic=document.createElementNS(ns,'circle');
  ic.setAttribute('cx',CX);ic.setAttribute('cy',CY);ic.setAttribute('r',IR);
  ic.setAttribute('fill','#0c0d12'); svg.appendChild(ic);
}
setInterval(function(){ if(document.getElementById('pg-sch').classList.contains('on')) drawChart(); }, 30000);

function drawLegend(){
  var el=document.getElementById('legEl');
  var k=dk(selDate), list=schData[k]||[];
  if(!list.length){
    el.innerHTML='<div class="empty"><div class="ei">📅</div>\u4e88\u5b9a\u304c\u3042\u308a\u307e\u305b\u3093<br>＋\u30dc\u30bf\u30f3\u3067\u8ffd\u52a0\u3057\u3066\u304f\u3060\u3055\u3044</div>';
    return;
  }
  el.innerHTML='';
  for(var i=0;i<list.length;i++){
    var s=list[i];
    var item=document.createElement('div'); item.className='legitem';
    var subj=(s.name==='\u52c9\u5f37'&&s.studySubj)?'<span class="lbadge study">'+s.studySubj+'</span>':'';
    var cal=s.showCal?'<span class="lbadge">📅</span>':'';
    item.innerHTML='<div class="ldot" style="background:'+s.color+'"></div><div class="lname">'+s.name+' '+subj+'</div>'+cal+'<div class="ltime">'+s.start+'〜'+s.end+'</div><button class="ldel" onclick="delSch(\''+k+'\','+i+')">✕</button>';
    el.appendChild(item);
  }
}
function delSch(k,i){ schData[k].splice(i,1); save(); drawChart(); drawLegend(); }

// =========================================
//  ADD SCHEDULE MODAL
// =========================================
var addCalOn=true, addTOn=false;
function openAddSch(prefill){
  if(prefill){ selDate=new Date(prefill); selDate.setHours(0,0,0,0); renderSchPage(); }
  document.getElementById('schName').value='';
  document.getElementById('schS').value='09:00';
  document.getElementById('schE').value='10:00';
  document.getElementById('studySubjFg').style.display='none';
  document.getElementById('subjCustom').value='';
  addCalOn=true; addTOn=false;
  ston('togCal',true); ston('togSaveT',false);
  buildCP('schCP','sch');
  renderSubjList();
  document.getElementById('ovAddSch').classList.add('on');
}
function sn(n){ document.getElementById('schName').value=n; onSchNameChange(); }
function onSchNameChange(){
  var v=document.getElementById('schName').value;
  document.getElementById('studySubjFg').style.display=(v==='\u52c9\u5f37')?'block':'none';
  if(v==='\u52c9\u5f37') renderSubjList();
}
function renderSubjList(){
  var el=document.getElementById('subjList'); el.innerHTML='';
  for(var i=0;i<studyTmpls.length;i++){
    var t=studyTmpls[i];
    var item=document.createElement('div'); item.className='ssi'; item.dataset.idx=i;
    item.innerHTML='<div class="ssi-dot" style="background:'+(t.color||'#9a4df0')+'"></div><div style="font-size:13px;font-weight:700;flex:1;">'+t.name+'</div>';
    item.onclick=(function(el2){ return function(){
      document.querySelectorAll('.ssi').forEach(function(s){ s.classList.remove('sel'); });
      el2.classList.add('sel');
      document.getElementById('subjCustom').value='';
    }; })(item);
    el.appendChild(item);
  }
}
function getSelSubj(){
  var c=document.getElementById('subjCustom').value.trim();
  if(c) return c;
  var s=document.querySelector('.ssi.sel');
  return s?studyTmpls[parseInt(s.dataset.idx)].name:'';
}
function saveSch(){
  var name=document.getElementById('schName').value.trim();
  var start=document.getElementById('schS').value;
  var end=document.getElementById('schE').value;
  if(!name||!start||!end){ alert('\u5168\u9805\u76ee\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
  var isStudy=(name==='\u52c9\u5f37');
  var k=dk(selDate);
  if(!schData[k]) schData[k]=[];
  schData[k].push({name:name,start:start,end:end,color:schSC,showCal:gton('togCal'),studySubj:isStudy?getSelSubj():''});
  if(gton('togSaveT')&&!isStudy) schTmpls.push({name:name,start:start,end:end,color:schSC});
  save(); cm('ovAddSch'); drawChart(); drawLegend();
}

// =========================================
//  TEMPLATE PICKER
// =========================================
function openTPicker(){
  var list=document.getElementById('tPickList'); list.innerHTML='';
  if(!schTmpls.length){
    list.innerHTML='<div class="empty">\u4e88\u5b9a\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u304c\u3042\u308a\u307e\u305b\u3093</div>';
  } else {
    for(var i=0;i<schTmpls.length;i++){
      var t=schTmpls[i];
      var item=document.createElement('div'); item.className='titem';
      item.innerHTML='<div class="tclr" style="background:'+t.color+'"></div><div class="tinfo"><div class="tname">'+t.name+'</div><div class="ttime">'+t.start+'〜'+t.end+'</div></div><button class="btn sm" onclick="useTmpl('+i+')">↑ 追加</button>';
      list.appendChild(item);
    }
  }
  document.getElementById('ovTPick').classList.add('on');
}
function useTmpl(i){
  var t=schTmpls[i], k=dk(selDate);
  if(!schData[k]) schData[k]=[];
  schData[k].push({name:t.name,start:t.start,end:t.end,color:t.color,showCal:true,studySubj:''});
  save(); cm('ovTPick'); drawChart(); drawLegend();
}

// =========================================
//  NEW/EDIT TEMPLATE
// =========================================
function openNewT(kind, editIdx){
  editTKind=kind||'sch'; editTIdx=(editIdx!=null)?editIdx:null;
  document.getElementById('tKind').value=editTKind;
  document.getElementById('newTTitle').textContent=(editIdx!=null)?'\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u7de8\u96c6':'\u30c6\u30f3\u30d7\u30ec\u30fc\u30c8\u4f5c\u6210';
  onTKindChange();
  if(editIdx!=null){
    var t=(editTKind==='sch')?schTmpls[editIdx]:studyTmpls[editIdx];

function shiftCalM(d){ calM+=d; if(calM<0){calM=11;calY--;} if(calM>11){calM=0;calY++;} renderCal(); }

function renderCal(){
  document.getElementById('calTitle').textContent = calY+'\u5e74 '+(calM+1)+'\u6708';
  var grid=document.getElementById('cgrid'); grid.innerHTML='';
  for(var i=0;i<7;i++){
    var dh=document.createElement('div'); dh.className='cdow'; dh.textContent=DJ[i]; grid.appendChild(dh);
  }
  var first=new Date(calY,calM,1), last=new Date(calY,calM+1,0), startDow=first.getDay();
  var today=new Date(); today.setHours(0,0,0,0);
  for(var i=0;i<startDow;i++){ grid.appendChild(mkCell(new Date(calY,calM,1-(startDow-i)),true,today)); }
  for(var d=1;d<=last.getDate();d++) grid.appendChild(mkCell(new Date(calY,calM,d),false,today));
  var total=startDow+last.getDate(), rem=total%7===0?0:7-(total%7);
  for(var i=1;i<=rem;i++) grid.appendChild(mkCell(new Date(calY,calM+1,i),true,today));
  updMonthlyCost();
}

function mkCell(date,om,today){
  var k=dk(date), cell=document.createElement('div'); cell.className='ccell';
  if(om){ cell.classList.add('om'); cell.innerHTML='<div class="cnum">'+date.getDate()+'</div>'; return cell; }
  var isToday=(date.getTime()===today.getTime());
  if(isToday) cell.classList.add('today');
  if(selCalDate&&date.getTime()===selCalDate.getTime()) cell.classList.add('sel');
  if(HOL[k]) cell.classList.add('hol');
  if(date.getDay()===6) cell.classList.add('sat');

  // 日付番号
  var numEl=document.createElement('div'); numEl.className='cnum';
  if(isToday){
    numEl.innerHTML='<span class="today-badge">'+date.getDate()+'</span>';
  } else {
    numEl.textContent=date.getDate();
  }
  cell.appendChild(numEl);

  // 予定バー
  var evs=document.createElement('div'); evs.className='cevs';
  var schList=(schData[k]||[]).filter(function(s){ return s.showCal; });
  for(var i=0;i<Math.min(schList.length,2);i++){
    var b=document.createElement('div'); b.className='cebar';
    b.style.background=schList[i].color;
    b.textContent=(schList[i].name==='\u52c9\u5f37'&&schList[i].studySubj)?schList[i].studySubj:schList[i].name;
    evs.appendChild(b);
  }
  if(schList.length>2){
    var m=document.createElement('div'); m.style.cssText='font-size:7px;color:#52566e;padding-left:2px;';
    m.textContent='+'+(schList.length-2); evs.appendChild(m);
  }
  cell.appendChild(evs);

  // 食事・TODOドット
  var meal=mealData[k]||{};
  var ttodos=todos.filter(function(t){ return t.deadline===k&&t.showCal; });
  if(meal.morning||meal.night||ttodos.length){
    var dots=document.createElement('div'); dots.className='mdots';
    if(meal.morning){ var d=document.createElement('div'); d.className='mdot mm'; dots.appendChild(d); }
    if(meal.night){ var d=document.createElement('div'); d.className='mdot mn'; dots.appendChild(d); }
    for(var i=0;i<Math.min(ttodos.length,2);i++){
      var d=document.createElement('div'); d.className='tdot'+(ttodos[i].done?' done':''); dots.appendChild(d);
    }
    cell.appendChild(dots);
  }

  cell.onclick=(function(dt){ return function(){ selCalDay(dt); }; })(date);
  return cell;
}

function togMeal(k,type){
  if(!mealData[k]) mealData[k]={morning:false,night:false};

  calY=parts[0]; calM=parts[1]-1;

  else renderDdMeal(k);

function updMonthlyCost(){
  var mc=0,nc=0;
  Object.keys(mealData).forEach(function(k){
    var m=mealData[k], parts=k.split('-').map(Number);
    if(parts[0]===calY&&parts[1]===calM+1){ if(m.morning)mc++; if(m.night)nc++; }
  });
  var total=mc*310+nc*580;
  document.getElementById('mTotal').textContent='¥'+total.toLocaleString();
  document.getElementById('mBreak').textContent='🌅 \u671d '+mc+'\u56de ¥'+(mc*310).toLocaleString()+'   🌙 \u5915 '+nc+'\u56de ¥'+(nc*580).toLocaleString();
}

function calcMins(subj,year,month){
  var total=0;
  Object.keys(schData).forEach(function(k){
    var parts=k.split('-').map(Number);
    if(parts[0]===year&&parts[1]===month){
      (schData[k]||[]).forEach(function(s){
        if(s.name==='\u52c9\u5f37'&&(subj===null||s.studySubj===subj)) total+=mRange(s.start,s.end);
      });
    }
  });
  return total;
}
function renderStudy(){
  var now=new Date(), y=now.getFullYear(), m=now.getMonth()+1;
  var total=calcMins(null,y,m);
  document.getElementById('studyMonthTotal').textContent=mhm(total);
  document.getElementById('studyMonthSub').textContent=y+'\u5e74'+m+'\u6708';
  var cards=document.getElementById('studyCards'); cards.innerHTML='';
  if(!studyTmpls.length){
    cards.innerHTML='<div class="empty"><div class="ei">📚</div>\u79d1\u76ee\u304c\u767b\u9332\u3055\u308c\u3066\u3044\u307e\u305b\u3093<br>\u30c6\u30f3\u30d7\u30ec\u30da\u30fc\u30b8\u304b\u3089\u8ffd\u52a0\u3057\u3066\u304f\u3060\u3055\u3044</div>';
  } else {
    studyTmpls.forEach(function(t){
      var mins=calcMins(t.name,y,m);
      var goalMins=(t.goalH||0)*60;
      var pct=goalMins?Math.min(100,Math.round(mins/goalMins*100)):null;
      var card=document.createElement('div'); card.className='scard';
      var paceHtml='';
      if(t.goalDate&&goalMins){
        var goal=new Date(t.goalDate);
        var daysLeft=Math.ceil((goal.getTime()-now.getTime())/(86400000));
        var remain=Math.max(0,goalMins-mins);
        if(daysLeft>0&&remain>0){
          var need=remain/daysLeft;
          var cl=need>180?'pace-ng':'pace-ok';
          var mark=need>180?'⚠️ \u30da\u30fc\u30b9\u304c\u53b3\u3057\u3081\u3067\u3059':need>90?'📈 \u30b3\u30f3\u30b9\u30bf\u30f3\u30c8\u306b\u7d9a\u3051\u307e\u3057\u3087\u3046':'✅ \u9806\u8abf\u306a\u30da\u30fc\u30b9\u3067\u3059';
          paceHtml='<div class="'+cl+'">📅 \u76ee\u6a19\u65e5\u307e\u3067 <strong>'+daysLeft+'\u65e5</strong> | \u6b8b\u308a <strong>'+mhm(remain)+'</strong><br>\u5fc5\u8981\u30da\u30fc\u30b9: <strong>'+mhm(Math.round(need))+'/\u65e5</strong>  '+mark+'</div>';
        } else if(remain<=0){
          paceHtml='<div class="pace-ok">🎉 \u76ee\u6a19\u6642\u9593\u9054\u6210\uff01</div>';
        } else if(daysLeft<=0){
          paceHtml='<div class="pace-ng">⚠️ \u76ee\u6a19\u65e5\u3092\u904e\u304e\u3066\u3044\u307e\u3059\u3002\u6b8b\u308a '+mhm(remain)+'</div>';
        }
      }
      card.innerHTML=
        '<div class="scard-head">'+
          '<div style="display:flex;align-items:center;gap:8px;"><div style="width:10px;height:10px;border-radius:50%;background:'+(t.color||'#9a4df0')+'"></div><div class="scard-name">'+t.name+'</div></div>'+
          '<div class="scard-time">'+mhm(mins)+'</div>'+
        '</div>'+
        (goalMins?'<div class="pbar"><div class="pfill" style="width:'+pct+'%;background:'+(t.color||'#9a4df0')+'"></div></div><div class="goal-info"><span>\u76ee\u6a19: '+t.goalH+'h</span><span>'+pct+'%\u9054\u6210</span></div>':'')+
        paceHtml;
      cards.appendChild(card);
    });
  }
  // month bar chart
  var barEl=document.getElementById('monthBarWrap'); barEl.innerHTML='';
  var months=[]; var n2=new Date();
  for(var i=5;i>=0;i--){
    var dd=new Date(n2.getFullYear(),n2.getMonth()-i,1);
    months.push({y:dd.getFullYear(),m:dd.getMonth()+1,label:(dd.getMonth()+1)+'\u6708'});
  }
  var bars=months.map(function(mo){ var mins=calcMins(null,mo.y,mo.m); return {label:mo.label,h:Math.round(mins/60*10)/10}; });
  var maxH=Math.max.apply(null,bars.map(function(b){ return b.h; }).concat([1]));
  barEl.innerHTML='<div style="font-size:10px;color:var(--mut);margin-bottom:10px;">\u6708\u5225\u52c9\u5f37\u6642\u9593\uff08\u904e\u53bb6\u30f6\u6708\uff09</div>'+
    '<div style="display:flex;align-items:flex-end;gap:5px;height:80px;">'+
    bars.map(function(b){
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;">'+
        '<div style="font-size:8px;color:var(--mut);">'+b.h+'h</div>'+
        '<div style="width:100%;background:#9a4df0;border-radius:3px 3px 0 0;height:'+Math.round(b.h/maxH*55+2)+'px;opacity:.7;"></div>'+
        '<div style="font-size:8px;color:var(--mut);">'+b.label+'</div>'+
      '</div>';
    }).join('')+
    '</div>';
}

function renderTodo(){

  else if(todoFilter==='near'){
    list=list.filter(function(t){ return !t.done&&t.deadline; });
    list.sort(function(a,b){ return a.deadline.localeCompare(b.deadline); });
  }
  var active=todos.filter(function(t){ return !t.done; }).length;

      }
    }

  if(!title){ alert('\u30bf\u30a4\u30c8\u30eb\u3092\u5165\u529b\u3057\u3066\u304f\u3060\u3055\u3044'); return; }
  var entry={title:title,note:document.getElementById('todoNote').value.trim(),deadline:document.getElementById('todoDeadline').value,showCal:gton('togTCal'),done:(editTodoIdx!=null?todos[editTodoIdx].done:false),createdAt:(editTodoIdx!=null?todos[editTodoIdx].createdAt:Date.now())};
  if(editTodoIdx!=null) todos[editTodoIdx]=entry; else todos.push(entry);
  save(); cm('ovAddTodo'); renderTodo();
}
function togTodo(i){ todos[i].done=!todos[i].done; save(); renderTodo(); }
function delTodo(i){ if(!confirm('\u524a\u9664\u3057\u307e\u3059\u304b\uff1f')) return; todos.splice(i,1); save(); renderTodo(); }

// =========================================
//  COLOR PICKER
// =========================================
function buildCP(id,scope){
  var cp=document.getElementById(id); if(!cp) return; cp.innerHTML='';
  PAL.forEach(function(c,i){
    var sw=document.createElement('div'); sw.className='csw'+(i===0?' sel':'');
    sw.style.background=c;
    sw.onclick=(function(color,el){ return function(){
      cp.querySelectorAll('.csw').forEach(function(s){ s.classList.remove('sel'); });
      el.classList.add('sel');
      if(scope==='sch') schSC=color;
      else if(scope==='tmpl') tmplSC=color;
      else if(scope==='studyT') studySC=color;
    }; })(c,sw);
    cp.appendChild(sw);
  });
  if(scope==='sch') schSC=PAL[0];
  else if(scope==='tmpl') tmplSC=PAL[0];
  else if(scope==='studyT') studySC=PAL[5];
}

// =========================================
//  TOGGLE HELPERS
// =========================================
function ston(id,on){ var el=document.getElementById(id); if(el) el.classList.toggle('on',on); }
function gton(id){ var el=document.getElementById(id); return el?el.classList.contains('on'):false; }
function tf(id){ var el=document.getElementById(id); if(el) el.classList.toggle('on'); }

// =========================================
//  MODAL
// =========================================
function cm(id){ document.getElementById(id).classList.remove('on'); }
document.querySelectorAll('.ov').forEach(function(o){
  o.addEventListener('click', function(e){ if(e.target===o) o.classList.remove('on'); });
});
